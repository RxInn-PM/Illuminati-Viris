:root {
  --intensity-glow: 0px; /* Managed by JS 0-40 */
  --theme-color: #00FF00; /* Default Ivory/Green */
}

/* 1x+++ Corner Logic */
.corner-container {
    position: absolute;
    width: 50px; /* Minimized Form */
    height: 50px;
    background: #000; /* Obsidian Scroll base */
    border: 1px solid var(--theme-color);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    overflow: hidden;
    box-shadow: 0 0 var(--intensity-glow) var(--theme-color);
}

/* Slide-out Expansion */
.corner-container:hover {
    width: 300px; /* The "+++" Expansion */
    height: 400px;
    z-index: 100;
}

/* Upper Middle Dropdown */
.search-drop-zone {
    position: absolute;
    top: -50px; /* Hidden */
    left: 50%;
    transform: translateX(-50%);
    transition: top 0.3s ease;
}

.search-drop-zone:hover {
    top: 10px; /* Drop Down */
}

/* Radar Dial Spinning Animation */
.radar-dial {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 2px dashed #00FFFF; /* Cyan */
    animation: spin 10s linear infinite;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}


function updateUIIntensity(value) {
    const root = document.documentElement;
    
    // Calculate Glow (0-40 units map to 0-20px blur)
    const glowSize = (value / 40) * 20;
    root.style.setProperty('--intensity-glow', `${glowSize}px`);

    // Dynamic Color Shift
    if (value > 26) {
        root.style.setProperty('--theme-color', '#FF0000'); // Red/High
    } else if (value > 13) {
        root.style.setProperty('--theme-color', '#FFFF00'); // Amber/Med
    } else {
        root.style.setProperty('--theme-color', '#00FF00'); // Green/Low
    }
}

// Example: Ecology unit hits 35
updateUIIntensity(35); 

class GlobalChatEngine {
    constructor(userWallet) {
        this.userWallet = userWallet;
        this.chatContainer = document.querySelector('.global-chat-stream');
        this.verifiedVectors = new Set(); // Stores approved addresses
    }

    // Simulate receiving a message from the Network
    receiveMessage(senderAddr, vectorName, text, intensity) {
        if (!this.isValidAddress(senderAddr)) return; // Security Gate

        const messageEl = document.createElement('div');
        messageEl.className = 'chat-entry';
        
        // Apply Color Intensity (0-40) to the Vector Name
        const color = intensity > 26 ? '#FF0000' : (intensity > 13 ? '#FFFF00' : '#00FF00');
        
        messageEl.innerHTML = `
            <span class="vector-tag" style="color: ${color}">[${vectorName}]</span>
            <span class="wallet-prefix">${senderAddr.substring(0, 6)}...</span>
            <p class="message-body">${this.sanitize(text)}</p>
        `;

        this.chatContainer.appendChild(messageEl);
        this.chatContainer.scrollTop = this.chatContainer.scrollHeight; // Auto-scroll
    }

    isValidAddress(addr) {
        return addr.startsWith('0x') && addr.length === 42;
    }

    sanitize(str) {
        return str.replace(/[<>]/g, ''); // Basic XSS protection
    }
}

