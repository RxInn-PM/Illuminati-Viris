import math

class MindMapNode:
    def __init__(self, address, vector_id, intensity):
        self.address = address # ETH Wallet
        self.vector_id = vector_id 
        self.intensity = intensity # 0-40 Scale
        # Coordinates based on Hash segments
        self.x = int(address[2:6], 16) % 1000 
        self.y = int(address[6:10], 16) % 1000
        self.z = intensity 

    def get_color(self):
        """Maps 3E Intensity to Hex."""
        if self.intensity > 26: return "#FF0000" # High
        if self.intensity > 13: return "#FFFF00" # Med
        return "#00FF00" # Low

class MindMapLink:
    def __init__(self, source, target):
        self.source = source # MindMapNode
        self.target = target # MindMapNode
        # Integrity = Distance Inverse
        self.integrity = 1 / math.sqrt((source.x - target.x)**2 + (source.y - target.y)**2)
class MindMapEngine {
    constructor(canvasId) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext('2d');
        this.nodes = [];
    }

    addNode(wallet, intensity) {
        const newNode = {
            id: wallet,
            x: Math.random() * this.canvas.width,
            y: Math.random() * this.canvas.height,
            intensity: intensity,
            color: intensity > 26 ? '#FF0000' : '#00FF00'
        };
        this.nodes.push(newNode);
        this.triggerRadarPing(); // Link to the UI pulse we built
    }

    drawLinks() {
        this.ctx.strokeStyle = 'rgba(0, 255, 255, 0.2)'; // Cyan Link
        this.nodes.forEach((node, i) => {
            if (i > 0) {
                this.ctx.beginPath();
                this.ctx.moveTo(this.nodes[0].x, this.nodes[0].y); // Anchor to You
                this.ctx.lineTo(node.x, node.y);
                this.ctx.stroke();
            }
        });
    }

    triggerRadarPing() {
        // Visual Ripple on the Radar Dial
        console.log("[RADAR] New Node Detected. Syncing coordinates...");
    }
}

